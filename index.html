<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Paper Plane | Infinite Protocol</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: flex-end; align-items: center; padding-right: 10%; pointer-events: none; z-index: 10; transition: opacity 0.5s; }
        .menu-card { pointer-events: auto; text-align: center; color: white; }
        #hud { position: absolute; top: 20px; left: 20px; color: #00ff41; font-size: 1.5rem; display: none; text-shadow: 0 0 10px #00ff41; }
        #game-over-screen { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #ff0000; display: none; z-index: 20; }
        button { padding: 15px 40px; font-size: 1.5rem; background: transparent; color: #00ff41; border: 2px solid #00ff41; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; pointer-events: auto; }
        button:hover { background: #00ff41; color: #000; box-shadow: 0 0 20px #00ff41; }
        .btn-restart { color: #ff0000; border-color: #ff0000; }
        .btn-restart:hover { background: #ff0000; color: #fff; box-shadow: 0 0 20px #ff0000; }
        .hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>
    <div id="hud">DISTANCE: <span id="scoreVal">0</span>m</div>
    <div id="game-over-screen">
        <h1 style="font-size: 4rem; margin-bottom: 0;">CRASHED</h1>
        <p style="margin-bottom: 2rem;">PROTOCOL TERMINATED</p>
        <button class="btn-restart" id="rebootBtn">REBOOT</button>
    </div>
    <div id="ui-layer">
        <div class="menu-card" id="menu">
            <h1 style="font-size: 3rem; margin-bottom: 0;">PAPER PLANE</h1>
            <p style="color: #888; margin-bottom: 2rem;">INFINITE PROTOCOL</p>
            <button id="playBtn">LAUNCH</button>
            <p id="controls-hint" style="font-size: 0.8rem; color: #555; margin-top: 1rem;">[W/S] Altitude | [A/D] Move World</p>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.136.0/build/three.module.js';
        import { Controller } from './controller.js';
        import { MController } from './Mcontroller.js';
        import { Player } from './player.js';
        import { WorldManager } from './world.js';

        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        const activeController = isMobile ? MController : Controller;
        if (isMobile) document.getElementById('controls-hint').innerText = "Touch Bottom-Left to Spawn Joystick";

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.Fog(0x050505, 5, 45);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        activeController.init();

        let gameState = 'MENU';
        let score = 0;
        let worldShiftX = 0;
        let dynamicWorldSpeed = 0.25;

        const ambientLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.5);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 7.5);
        scene.add(directionalLight);

        let player = new Player(scene);
        let world = new WorldManager(scene);

        const playBtn = document.getElementById('playBtn');
        const rebootBtn = document.getElementById('rebootBtn');
        const menuUI = document.getElementById('menu');
        const hud = document.getElementById('hud');
        const scoreVal = document.getElementById('scoreVal');
        const gameOverUI = document.getElementById('game-over-screen');

        playBtn.addEventListener('click', () => {
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            gameState = 'TRANSITION';
            menuUI.parentElement.classList.add('hidden');
            hud.style.display = 'block';
            if (isMobile && MController.showJoystick) MController.showJoystick();
        });

        rebootBtn.addEventListener('click', () => {
            gameState = 'MENU';
            score = 0;
            scoreVal.innerText = "0";
            worldShiftX = 0;
            dynamicWorldSpeed = 0.25;
            lerpFactor = 0;

            if (isMobile) MController.reset();

            scene.remove(player.group);
            world.chunks.forEach(chunk => scene.remove(chunk));
            
            player = new Player(scene);
            world = new WorldManager(scene);

            gameOverUI.style.display = 'none';
            menuUI.parentElement.classList.remove('hidden');
            hud.style.display = 'none';
        });

        function checkCollisions() {
            const planeBox = new THREE.Box3().setFromObject(player.group);
            for (let obs of world.obstacles) {
                const obsBox = new THREE.Box3().setFromObject(obs);
                if (planeBox.intersectsBox(obsBox)) return true;
            }
            return false;
        }

        const clock = new THREE.Clock();
        let lerpFactor = 0;

        function animate() {
            requestAnimationFrame(animate);
            if (gameState === 'GAMEOVER') return;

            const t = clock.getElapsedTime();
            world.update(dynamicWorldSpeed, worldShiftX);

            if (gameState === 'MENU') {
                camera.position.lerp(new THREE.Vector3(2, 4, 8), 0.05);
                camera.lookAt(player.group.position);
                player.updateMenuAnimation(t);
            } 
            else if (gameState === 'TRANSITION') {
                lerpFactor += 0.015;
                player.group.position.x = THREE.MathUtils.lerp(-5, 0, lerpFactor);
                camera.position.lerp(new THREE.Vector3(0, 4.5, 5), 0.05);
                camera.lookAt(player.group.position);
                if (lerpFactor >= 1) gameState = 'PLAYING';
            } 
            else if (gameState === 'PLAYING') {
                dynamicWorldSpeed = 0.25 + (score * 0.0005);
                score += dynamicWorldSpeed * 0.1;
                scoreVal.innerText = Math.floor(score);

                const ctrl = activeController.update(player.group, worldShiftX);
                worldShiftX = ctrl.worldShiftX;

                player.updateFlightAnimation(t, ctrl);

                camera.position.set(0, player.group.position.y + 1.5, 5);
                camera.lookAt(0, player.group.position.y, -2);

                if (ctrl.isCrashed || ctrl.isGroundHit || checkCollisions()) {
                    gameState = 'GAMEOVER';
                    gameOverUI.style.display = 'block';
                    hud.style.display = 'none';
                    if (isMobile) MController.disable();
                }
            }
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
