<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Paper Plane | Infinite Protocol</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; transition: opacity 0.5s; }
        
        #header-container, .game-over-header {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            width: 100%;
        }
        .game-title, .crash-title {
            font-size: 4.5rem;
            margin: 0;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 8px;
            text-shadow: 0 0 20px #00ff41, 0 0 40px #00ff41;
            font-weight: 900;
            font-style: italic;
        }
        .crash-title {
            color: #ff0000;
            text-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000;
        }
        .game-subtitle, .crash-subtitle {
            font-size: 1.5rem;
            color: #888;
            margin-top: 5px;
            letter-spacing: 2px;
        }

        .menu-card, .game-over-card { 
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: auto; 
            text-align: center; 
            color: white; 
            width: 100%;
        }
        
        #menu {
            left: auto;
            right: 5%;
            transform: translateY(0);
            width: auto;
        }

        #hud { position: absolute; top: 20px; left: 20px; color: #00ff41; font-size: 1.5rem; display: none; text-shadow: 0 0 10px #00ff41; pointer-events: none; }
        #high-score-hud { font-size: 0.9rem; color: #008822; margin-top: 5px; }
        .coin-display { color: #ffd900; text-shadow: 0 0 10px #ff0000; font-weight: bold; }
        
        #menu-coins { position: absolute; top: 20px; left: 20px; font-size: 2rem; z-index: 11; pointer-events: none; }

        #game-over-screen { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            display: none; 
            z-index: 20; 
            pointer-events: none;
        }
        
        button { 
            padding: 15px 60px; 
            font-size: 2rem; 
            background: transparent; 
            color: #00ff41; 
            border: 2px solid #00ff41; 
            border-radius: 20px; 
            cursor: pointer; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            transition: 0.3s; 
            pointer-events: auto; 
        }
        button:hover { background: #00ff41; color: #000; box-shadow: 0 0 30px #00ff41; }
        
        .btn-restart { color: #ff0000; border-color: #ff0000; }
        .btn-restart:hover { background: #ff0000; color: #fff; box-shadow: 0 0 20px #ff0000; }
        
        .arrow-btn { padding: 10px; border: none; font-size: 2.5rem; color: #00ff41; min-width: 60px; }
        .arrow-btn:hover { background: transparent; color: #fff; box-shadow: none; transform: scale(1.2); }

        .icon-btn { width: 50px; cursor: pointer; transition: transform 0.2s; pointer-events: auto; }
        .icon-btn:hover { transform: scale(1.1); }

        .icon-white { filter: invert(1) brightness(2); }

        #settings-btn-desktop { position: absolute; top: 20px; right: 20px; z-index: 11; }
        #settings-btn-mobile { display: none; }
        #pause-btn { position: absolute; top: 20px; right: 20px; z-index: 25; display: none; width: 40px; }

        #settings-modal {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95); border: 2px solid #00ff41; padding: 40px 60px; border-radius: 20px;
            z-index: 1000; text-align: center; box-shadow: 0 0 30px #00ff41; pointer-events: auto;
            min-width: 250px;
        }

        .close-btn {
            position: absolute; top: 10px; right: 20px; color: #888; font-size: 2.5rem;
            cursor: pointer; transition: color 0.3s; font-weight: bold;
        }
        .close-btn:hover { color: #ff0000; }

        #rotate-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: none;
            flex-direction: column; justify-content: center; align-items: center;
            color: #00ff41; font-size: 1.5rem; text-align: center; font-weight: bold; letter-spacing: 2px;
        }
        #rotate-overlay img { width: 100px; animation: rotatePhone 2s infinite ease-in-out; margin-bottom: 20px; }
        
        @keyframes rotatePhone { 
            0% { transform: rotate(-90deg); } 
            50% { transform: rotate(0deg); } 
            100% { transform: rotate(-90deg); } 
        }

        #countdown-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; align-items: flex-start; justify-content: center;
            padding-top: 6%; z-index: 15; pointer-events: none;
        }
        #countdown-overlay.active { display: flex; }
        #countdown-text {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 7rem; font-weight: 900; font-style: italic; color: #ffffff;
            text-transform: uppercase; letter-spacing: 6px;
            text-shadow: 0 0 30px #00ff41, 0 0 60px #00ff41;
            animation: countdown-pop 0.35s cubic-bezier(0.175,0.885,0.32,1.275);
            will-change: transform, opacity;
        }
        #countdown-text.go { color: #00ff41; text-shadow: 0 0 30px #00ff41, 0 0 80px #00ff41, 0 0 120px #00ff41; }
        
        @keyframes countdown-pop {
            0%   { transform: scale(2.2); opacity: 0; }
            60%  { transform: scale(0.92); opacity: 1; }
            100% { transform: scale(1);   opacity: 1; }
        }
        @keyframes countdown-fade {
            0%   { opacity: 1; }
            70%  { opacity: 1; }
            100% { opacity: 0; }
        }
        #countdown-text.fade-out { animation: countdown-fade 0.55s ease forwards; }

        @media (max-width: 768px) {
            .game-title, .crash-title { font-size: 2.5rem; letter-spacing: 4px; }
            .game-subtitle, .crash-subtitle { font-size: 1rem; }
            #menu { right: 50%; transform: translateX(50%); bottom: 8%; width: 90%; }
            .game-over-card { bottom: 8%; }
            button { padding: 12px 20px; font-size: 1.5rem; }
            
            #countdown-text { font-size: 4.5rem; text-shadow: 0 0 10px #00ff41; }
            #countdown-text.go { text-shadow: 0 0 15px #00ff41; }
            
            #settings-btn-desktop { display: none; }
            #settings-btn-mobile { display: block; }
        }

        @media (max-width: 768px) and (orientation: portrait) {
            #rotate-overlay { display: flex; }
        }
    </style>
</head>
<body>
    <div id="rotate-overlay">
        <img class="icon-white" src="https://cdn-icons-png.flaticon.com/512/9515/9515279.png" alt="Rotate Device">
        <p>PLEASE ROTATE YOUR<br>DEVICE TO PLAY</p>
    </div>

    <img id="pause-btn" class="icon-btn icon-white" src="https://cdn-icons-png.flaticon.com/512/151/151859.png" alt="Pause">

    <div id="settings-modal">
        <div id="closeSettingsBtn" class="close-btn">&times;</div>
        <h2 style="color: white; margin-top: 0; letter-spacing: 2px; margin-bottom: 30px;">SETTINGS</h2>
        <div style="display: flex; justify-content: center; gap: 40px;">
            <div style="text-align: center;">
                <p style="color: white; margin-bottom: 10px; letter-spacing: 2px;">MUSIC</p>
                <img id="muteBtn" class="icon-btn icon-white" src="" alt="Toggle Music" style="width: 60px;">
            </div>
            <div style="text-align: center;">
                <p style="color: white; margin-bottom: 10px; letter-spacing: 2px;">SFX</p>
                <img id="sfxBtn" class="icon-btn icon-white" src="" alt="Toggle SFX" style="width: 60px;">
            </div>
        </div>
    </div>

    <div id="countdown-overlay">
        <span id="countdown-text">3</span>
    </div>

    <div id="menu-coins" class="coin-display">
        🪙 <span id="menuCoinVal">0</span>
    </div>

    <div id="hud">
        DISTANCE: <span id="scoreVal">0</span>m
        <div id="high-score-hud">BEST: <span id="bestVal">0</span>m</div>
        <div class="coin-display" style="font-size: 1.2rem; margin-top: 5px;">
            🪙 <span id="hudCoinVal">0</span>
        </div>
    </div>

    <div id="game-over-screen">
        <div class="game-over-header">
            <h1 class="crash-title">CRASHED</h1>
            <div class="crash-subtitle">By L.Malakar</div>
        </div>
        <div class="game-over-card">
            <div style="display: flex; justify-content: center; gap: 40px; margin-bottom: 20px;">
                <img class="icon-btn icon-white" id="go-home-btn" src="https://cdn-icons-png.flaticon.com/512/15844/15844408.png" alt="Home">
                <img class="icon-btn icon-white" id="go-settings-btn" src="https://cdn-icons-png.flaticon.com/512/2040/2040504.png" alt="Settings">
            </div>
            <button class="btn-restart" id="rebootBtn">RETRY</button>
        </div>
    </div>

    <div id="ui-layer">
        <img class="icon-btn icon-white" id="settings-btn-desktop" src="https://cdn-icons-png.flaticon.com/512/2040/2040504.png" alt="Settings">
        <div id="header-container">
            <h1 class="game-title">PAPER PLANE</h1>
            <div class="game-subtitle">Simulator 3D</div>
        </div>
        <div class="menu-card" id="menu">
            <div style="display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 20px;">
                <button id="prevPlaneBtn" class="arrow-btn">❮</button>
                <div id="planeName" style="font-size: 2rem; width: 220px; font-weight: bold; text-shadow: 0 0 10px #00ff41; letter-spacing: 2px;">CLASSIC</div>
                <button id="nextPlaneBtn" class="arrow-btn">❯</button>
            </div>
            <div style="display: flex; justify-content: center; align-items: center; gap: 20px;">
                <button id="playBtn" style="min-width: 250px;">PLAY</button>
                <img class="icon-btn icon-white" id="settings-btn-mobile" src="https://cdn-icons-png.flaticon.com/512/2040/2040504.png" alt="Settings">
            </div>
            <p id="controls-hint" style="font-size: 1rem; color: #aaa; margin-top: 1.5rem; letter-spacing: 1px;">use [W/A/S/D] to move plane</p>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.136.0/build/three.module.js';
        import { Controller } from './controller.js';
        import { MController } from './Mcontroller.js';
        import { Player } from './player.js';
        import { WorldManager } from './world.js';
        import { CollectableManager } from './collectable.js'; 
        import { startMusic, toggleMute, toggleSFX, playClick, playCrash, playBeep, playCoin, getMusicMuted, getSFXMuted } from './music-handler.js';

        startMusic();

        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        const activeController = isMobile ? MController : Controller;
        if (isMobile) document.getElementById('controls-hint').innerText = "use Joystick to play";

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.Fog(0x050505, 5, 45);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: !isMobile });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        activeController.init();

        let gameState = 'MENU';
        let isPaused = false;
        let score = 0;
        let worldShiftX = 0;
        let dynamicWorldSpeed = 0.25;
        let lerpFactor = 0;
        let gameTime = 0;
        let highScore = localStorage.getItem('paperPlane_highScore') || 0;
        document.getElementById('bestVal').innerText = Math.floor(highScore);

        let coins = parseInt(localStorage.getItem('paperPlane_coins') || '0');
        let ownedPlanes = JSON.parse(localStorage.getItem('paperPlane_owned') || '[0]');
        let currentPlaneIndex = parseInt(localStorage.getItem('paperPlane_current') || '0');
        let viewIndex = currentPlaneIndex;

        document.getElementById('menuCoinVal').innerText = coins;
        document.getElementById('hudCoinVal').innerText = coins;

        function saveProgress() {
            localStorage.setItem('paperPlane_coins', coins.toString());
            localStorage.setItem('paperPlane_owned', JSON.stringify(ownedPlanes));
            localStorage.setItem('paperPlane_current', currentPlaneIndex.toString());
        }

        const ambientLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.5);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 7.5);
        scene.add(directionalLight);

        let player = new Player(scene);
        player.setPlaneType(currentPlaneIndex); 
        
        let world = new WorldManager(scene, isMobile);
        let collectables = new CollectableManager(scene, isMobile);

        const playBtn = document.getElementById('playBtn');
        const rebootBtn = document.getElementById('rebootBtn');
        const pauseBtn = document.getElementById('pause-btn');
        const menuUI = document.getElementById('ui-layer');
        const hud = document.getElementById('hud');
        const scoreVal = document.getElementById('scoreVal');
        const gameOverUI = document.getElementById('game-over-screen');
        const countdownOverlay = document.getElementById('countdown-overlay');
        const planeNameDisplay = document.getElementById('planeName');
        const menuCoinDisplay = document.getElementById('menu-coins');
        let countdownText = document.getElementById('countdown-text');

        function updateMenuUI() {
            const def = player.planeDefs[viewIndex];
            planeNameDisplay.innerText = def.name;
            player.setPlaneType(viewIndex); 

            if (ownedPlanes.includes(viewIndex)) {
                playBtn.innerHTML = (viewIndex === currentPlaneIndex) ? "PLAY" : "SELECT";
                playBtn.style.borderColor = "#00ff41";
                playBtn.style.color = "#00ff41";
            } else {
                playBtn.innerHTML = `🔒 BUY ${def.price}`;
                playBtn.style.borderColor = "#ffd700";
                playBtn.style.color = "#ffd700";
            }
        }
        updateMenuUI();

        document.getElementById('prevPlaneBtn').addEventListener('click', () => {
            playClick();
            viewIndex = (viewIndex - 1 + player.planeDefs.length) % player.planeDefs.length;
            updateMenuUI();
        });

        document.getElementById('nextPlaneBtn').addEventListener('click', () => {
            playClick();
            viewIndex = (viewIndex + 1) % player.planeDefs.length;
            updateMenuUI();
        });

        // GOD MODE FIX: Added {capture: true} to bypass joystick overlays on mobile
        function bindTouchAndClick(elementId, handler) {
            const el = document.getElementById(elementId);
            const wrappedHandler = (e) => {
                e.preventDefault(); 
                e.stopPropagation();
                handler(e);
            };
            el.addEventListener('click', wrappedHandler, true);
            el.addEventListener('touchstart', wrappedHandler, { passive: false, capture: true });
        }

        const settingsModal = document.getElementById('settings-modal');
        const muteBtn = document.getElementById('muteBtn');
        const sfxBtn = document.getElementById('sfxBtn');
        
        muteBtn.src = getMusicMuted() ? "https://cdn-icons-png.flaticon.com/512/727/727240.png" : "https://cdn-icons-png.flaticon.com/512/727/727269.png";
        sfxBtn.src = getSFXMuted() ? "https://cdn-icons-png.flaticon.com/512/727/727240.png" : "https://cdn-icons-png.flaticon.com/512/727/727269.png";

        function openSettings() { playClick(); settingsModal.style.display = 'block'; }
        function closeSettings() { playClick(); settingsModal.style.display = 'none'; }

        bindTouchAndClick('settings-btn-desktop', openSettings);
        bindTouchAndClick('settings-btn-mobile', openSettings);
        bindTouchAndClick('go-settings-btn', openSettings);
        bindTouchAndClick('closeSettingsBtn', closeSettings);

        // GOD MODE: Patched Mobile Toggle Bug
        const handleMute = () => {
            playClick();
            const isMuted = toggleMute();
            muteBtn.src = isMuted ? "https://cdn-icons-png.flaticon.com/512/727/727240.png" : "https://cdn-icons-png.flaticon.com/512/727/727269.png";
        };
        muteBtn.addEventListener('click', handleMute);
        muteBtn.addEventListener('touchstart', (e) => { e.preventDefault(); handleMute(); }, {passive: false});

        const handleSFX = () => {
            const isSFXMuted = toggleSFX();
            if (!isSFXMuted) playClick();
            sfxBtn.src = isSFXMuted ? "https://cdn-icons-png.flaticon.com/512/727/727240.png" : "https://cdn-icons-png.flaticon.com/512/727/727269.png";
        };
        sfxBtn.addEventListener('click', handleSFX);
        sfxBtn.addEventListener('touchstart', (e) => { e.preventDefault(); handleSFX(); }, {passive: false});

        function togglePause(e) {
            if (e) { e.preventDefault(); e.stopPropagation(); }
            playClick();
            isPaused = !isPaused;
            pauseBtn.src = isPaused 
                ? "https://cdn-icons-png.flaticon.com/512/724/724927.png" 
                : "https://cdn-icons-png.flaticon.com/512/151/151859.png";
        }
        pauseBtn.addEventListener('click', togglePause);
        pauseBtn.addEventListener('touchstart', togglePause, { passive: false });

        function startCountdown(onDone) {
            const steps = ['3', '2', '1', 'GO!'];
            let i = 0;
            countdownOverlay.classList.add('active');

            function showStep() {
                if (steps[i] === 'GO!') playBeep(true);
                else playBeep(false);

                const fresh = countdownText.cloneNode(true);
                fresh.id = 'countdown-text';
                fresh.textContent = steps[i];
                fresh.classList.toggle('go', steps[i] === 'GO!');
                countdownText.replaceWith(fresh);
                countdownText = fresh;

                i++;
                if (i < steps.length) {
                    setTimeout(showStep, 900);
                } else {
                    setTimeout(() => {
                        const el = countdownOverlay.querySelector('#countdown-text');
                        el.classList.add('fade-out');
                        setTimeout(() => {
                            countdownOverlay.classList.remove('active');
                            pauseBtn.style.display = 'block'; 
                            onDone();
                        }, 550);
                    }, 600);
                }
            }
            showStep();
        }

        playBtn.addEventListener('click', () => {
            if (gameState !== 'MENU') return;
            const def = player.planeDefs[viewIndex];
            if (!ownedPlanes.includes(viewIndex)) {
                if (coins >= def.price) {
                    playCoin();
                    coins -= def.price;
                    ownedPlanes.push(viewIndex);
                    document.getElementById('menuCoinVal').innerText = coins;
                    document.getElementById('hudCoinVal').innerText = coins;
                    saveProgress();
                    updateMenuUI();
                } else {
                    playCrash(); 
                }
                return;
            } else if (viewIndex !== currentPlaneIndex) {
                playClick();
                currentPlaneIndex = viewIndex;
                saveProgress();
                updateMenuUI();
                return;
            }
            playClick();
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            gameState = 'TRANSITION';
            menuUI.style.opacity = '0';
            menuCoinDisplay.style.opacity = '0';
            setTimeout(() => { menuUI.style.display = 'none'; menuCoinDisplay.style.display = 'none'; }, 500);
            hud.style.display = 'block';
            if (isMobile && MController.showJoystick) MController.showJoystick();
        });

        document.getElementById('go-home-btn').addEventListener('click', () => {
            playClick();
            gameState = 'MENU';
            score = 0;
            scoreVal.innerText = "0";
            worldShiftX = 0;
            dynamicWorldSpeed = 0.25;
            lerpFactor = 0;
            gameTime = 0;
            isPaused = false;
            pauseBtn.style.display = 'none';
            if (isMobile) MController.reset();
            scene.remove(player.group);
            world.chunks.forEach(chunk => scene.remove(chunk));
            world.obstacles.forEach(obs => { obs.geometry.dispose(); obs.material.dispose(); });
            world.obstacles.length = 0;
            collectables.dispose();
            player = new Player(scene);
            player.setPlaneType(currentPlaneIndex); 
            world = new WorldManager(scene, isMobile);
            collectables = new CollectableManager(scene, isMobile);
            gameOverUI.style.display = 'none';
            hud.style.display = 'none';
            menuUI.style.display = 'block';
            menuCoinDisplay.style.display = 'block';
            updateMenuUI();
            setTimeout(() => { menuUI.style.opacity = '1'; menuCoinDisplay.style.opacity = '1'; }, 10);
        });

        rebootBtn.addEventListener('click', () => {
            playClick();
            score = 0;
            scoreVal.innerText = "0";
            worldShiftX = 0;
            dynamicWorldSpeed = 0.25;
            lerpFactor = 1;
            gameTime = 0;
            isPaused = false;
            if (isMobile) MController.reset();
            scene.remove(player.group);
            world.chunks.forEach(chunk => scene.remove(chunk));
            world.obstacles.forEach(obs => { obs.geometry.dispose(); obs.material.dispose(); });
            world.obstacles.length = 0;
            collectables.dispose();
            player = new Player(scene);
            player.setPlaneType(currentPlaneIndex);
            world = new WorldManager(scene, isMobile);
            collectables = new CollectableManager(scene, isMobile);
            player.group.position.x = 0;
            gameOverUI.style.display = 'none';
            hud.style.display = 'block';
            pauseBtn.style.display = 'none'; 
            if (isMobile && MController.showJoystick) MController.showJoystick();
            gameState = 'COUNTDOWN';
            player.setGhost(true);
            activeController.isGhostMode = true;
            startCountdown(() => {
                player.setGhost(false);
                activeController.isGhostMode = false;
                gameState = 'PLAYING';
            });
        });

        const _planeBox = new THREE.Box3();
        const _obsBox = new THREE.Box3();
        const _tempVec = new THREE.Vector3();

        function checkObstacleCollisions() {
            _planeBox.setFromObject(player.hitbox);
            for (let obs of world.obstacles) {
                obs.getWorldPosition(_tempVec);
                if (Math.abs(_tempVec.z) > 3) continue;
                _obsBox.setFromObject(obs);
                if (_planeBox.intersectsBox(_obsBox)) return true;
            }
            return false;
        }

        function checkCoinCollisions() {
            _planeBox.setFromObject(player.hitbox);
            for (let item of collectables.items) {
                if (!item.visible) continue; 
                item.getWorldPosition(_tempVec);
                if (Math.abs(_tempVec.z) > 3) continue;
                _obsBox.setFromObject(item);
                if (_planeBox.intersectsBox(_obsBox)) {
                    item.visible = false;
                    item.position.y = -999; 
                    coins++;
                    document.getElementById('hudCoinVal').innerText = coins;
                    document.getElementById('menuCoinVal').innerText = coins;
                    playCoin();
                    saveProgress();
                }
            }
        }

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            if (gameState === 'GAMEOVER') return;
            const delta = clock.getDelta(); 
            if (isPaused) {
                renderer.render(scene, camera);
                return;
            }
            gameTime += delta; 
            const t = gameTime;
            world.update(dynamicWorldSpeed, worldShiftX, t);
            collectables.update(dynamicWorldSpeed, worldShiftX, t);

            if (gameState === 'MENU') {
                camera.position.lerp(new THREE.Vector3(2, 4, 8), 0.05);
                camera.lookAt(player.group.position);
                player.updateMenuAnimation(t);
            } 
            else if (gameState === 'TRANSITION') {
                lerpFactor += 0.015;
                player.group.position.x = THREE.MathUtils.lerp(-5, 0, lerpFactor);
                camera.position.lerp(new THREE.Vector3(0, 4.5, 5), 0.05);
                camera.lookAt(player.group.position);
                if (lerpFactor >= 1) {
                    gameState = 'COUNTDOWN';
                    player.setGhost(true);
                    activeController.isGhostMode = true;
                    startCountdown(() => {
                        player.setGhost(false);
                        activeController.isGhostMode = false;
                        gameState = 'PLAYING';
                    });
                }
            } 
            else if (gameState === 'COUNTDOWN') {
                dynamicWorldSpeed = Math.min(0.25 + (score * 0.0005), 0.8);
                score += dynamicWorldSpeed * 0.1;
                scoreVal.innerText = Math.floor(score);
                const ctrl = activeController.update(player.group, worldShiftX, delta);
                worldShiftX = ctrl.worldShiftX;
                player.updateFlightAnimation(t, ctrl);
                player.updateGlitch(t);
                camera.position.set(0, player.group.position.y + 1.5, 5);
                camera.lookAt(0, player.group.position.y, -2);
                checkCoinCollisions(); 
            }
            else if (gameState === 'PLAYING') {
                dynamicWorldSpeed = Math.min(0.25 + (score * 0.0005), 0.8);
                score += dynamicWorldSpeed * 0.1;
                scoreVal.innerText = Math.floor(score);
                const ctrl = activeController.update(player.group, worldShiftX, delta);
                worldShiftX = ctrl.worldShiftX;
                player.updateFlightAnimation(t, ctrl);
                camera.position.set(0, player.group.position.y + 1.5, 5);
                camera.lookAt(0, player.group.position.y, -2);
                checkCoinCollisions(); 
                if (ctrl.isCrashed || ctrl.isGroundHit || checkObstacleCollisions()) {
                    playCrash();
                    gameState = 'CRASHING';
                    pauseBtn.style.display = 'none';
                    if (isMobile) MController.disable();
                }
            }
            else if (gameState === 'CRASHING') {
                player.updateCrashAnimation(delta);
                camera.position.set(0, player.group.position.y + 1.5, 5);
                camera.lookAt(0, player.group.position.y, -2);
                if (player.group.position.y <= 0 && gameOverUI.style.display !== 'block') {
                    if (score > highScore) {
                        highScore = score;
                        localStorage.setItem('paperPlane_highScore', highScore);
                        document.getElementById('bestVal').innerText = Math.floor(highScore);
                    }
                    gameOverUI.style.display = 'block';
                    hud.style.display = 'none';
                }
            }
            renderer.render(scene, camera);
        }
        animate();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
